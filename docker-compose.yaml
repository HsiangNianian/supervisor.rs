version: "3.8"

services:
  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPERVISOR_NAME=production
      - SUPERVISOR_SERVER_HOST=0.0.0.0
      - SUPERVISOR_SERVER_PORT=8000
      - SUPERVISOR_LOG_LEVEL=INFO
    volumes:
      - ./supervisor.yaml:/app/supervisor.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
